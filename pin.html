<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For Shim · Enter PIN</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="pin-style.css">
  <link rel="icon" href="logo.png">

</head>
<body>

<canvas id="blossom-canvas"></canvas>
<div class="bg-overlay"></div>
<div class="scanlines"></div>

<!-- Corner ornaments -->
<div class="corner corner-tl">
  <svg viewBox="0 0 60 60"><path d="M2 58 L2 2 L58 2"/><path d="M12 48 L12 12 L48 12"/><circle cx="2" cy="2" r="2" fill="currentColor"/></svg>
</div>
<div class="corner corner-br">
  <svg viewBox="0 0 60 60"><path d="M2 58 L2 2 L58 2"/><path d="M12 48 L12 12 L48 12"/><circle cx="2" cy="2" r="2" fill="currentColor"/></svg>
</div>

<!-- Success overlay -->
<div class="success-overlay" id="success-overlay">
  <div class="success-ring">
    <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  </div>
  <div class="success-text">Welcome Back</div>
  <div class="success-sub">Opening your world…</div>
</div>

<div class="stage">

  <!-- Header -->
  <div class="pin-header">
    <div class="pin-logo">SHIMMERY'S <span>PAGE</span></div>
    <div class="pin-sub">Chronicles of Us</div>
    <div class="pin-divider"></div>
  </div>

  <!-- Lock icon -->
  <div class="lock-icon" id="lock-icon">
    <svg viewBox="0 0 24 24" id="lock-svg">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>

  <!-- Prompt -->
  <div class="pin-prompt" id="pin-prompt">Enter your PIN</div>

  <!-- Dots -->
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="dot-0"></div>
    <div class="pin-dot" id="dot-1"></div>
    <div class="pin-dot" id="dot-2"></div>
    <div class="pin-dot" id="dot-3"></div>
    <div class="pin-dot" id="dot-4"></div>
    <div class="pin-dot" id="dot-5"></div>
  </div>

  <!-- Numpad -->
  <div class="numpad" id="numpad">
    <!-- Row 1 -->
    <button class="num-btn" data-digit="1">
      <span class="num-digit">1</span>
    </button>
    <button class="num-btn" data-digit="2">
      <span class="num-digit">2</span>
      <span class="num-letters">ABC</span>
    </button>
    <button class="num-btn" data-digit="3">
      <span class="num-digit">3</span>
      <span class="num-letters">DEF</span>
    </button>
    <!-- Row 2 -->
    <button class="num-btn" data-digit="4">
      <span class="num-digit">4</span>
      <span class="num-letters">GHI</span>
    </button>
    <button class="num-btn" data-digit="5">
      <span class="num-digit">5</span>
      <span class="num-letters">JKL</span>
    </button>
    <button class="num-btn" data-digit="6">
      <span class="num-digit">6</span>
      <span class="num-letters">MNO</span>
    </button>
    <!-- Row 3 -->
    <button class="num-btn" data-digit="7">
      <span class="num-digit">7</span>
      <span class="num-letters">PQRS</span>
    </button>
    <button class="num-btn" data-digit="8">
      <span class="num-digit">8</span>
      <span class="num-letters">TUV</span>
    </button>
    <button class="num-btn" data-digit="9">
      <span class="num-digit">9</span>
      <span class="num-letters">WXYZ</span>
    </button>
    <!-- Row 4 -->
    <button class="num-btn btn-empty" disabled></button>
    <button class="num-btn" data-digit="0">
      <span class="num-digit">0</span>
    </button>
    <button class="num-btn btn-del" id="btn-del" aria-label="Delete">
      <svg viewBox="0 0 24 24"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="18" y1="9" x2="13" y2="14"/><line x1="13" y1="9" x2="18" y2="14"/></svg>
    </button>
  </div>

  <div class="pin-hint" id="pin-hint">Protected · 4-digit PIN required</div>

</div>

<script src="pin-script.js"></script>
</body>
</html>
