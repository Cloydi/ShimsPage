<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extras · Shimmery's Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="extras-styles.css">
    <link rel="icon" href="../logo.png">
</head>
<body>

<canvas id="blossom-canvas"></canvas>
<div class="bg-overlay"></div>
<div class="scanlines"></div>
<div class="corner corner-tl"><svg viewBox="0 0 60 60"><path d="M2 58 L2 2 L58 2"/><path d="M12 48 L12 12 L48 12"/><circle cx="2" cy="2" r="2" fill="currentColor"/></svg></div>
<div class="corner corner-br"><svg viewBox="0 0 60 60"><path d="M2 58 L2 2 L58 2"/><path d="M12 48 L12 12 L48 12"/><circle cx="2" cy="2" r="2" fill="currentColor"/></svg></div>

<header>
  <a class="back-btn" href="../mainMenu.html">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    Return
  </a>
  <div class="page-heading">
    <div class="eyebrow">Chapter V</div>
    <h1>Extra<span>s</span></h1>
  </div>
</header>

<div class="stage">

  <!-- SHELF -->
  <div class="shelf">
    <div class="shelf-label">Vinyl Collection</div>
    <div class="vinyl-stack" id="vinyl-stack"></div>
  </div>

  <div class="stage-divider"></div>

  <!-- PLAYER -->
  <div class="player-area">
    <div class="player-label">Record Player</div>
    <div class="player-body">

      <div class="turntable-base">

        <div class="platter-well" id="platter-well">
          <div class="platter-grooves">
            <svg viewBox="0 0 220 220" width="220" height="220">
              <circle cx="110" cy="110" r="104" fill="none" stroke="#d94f87" stroke-width="0.6"/>
              <circle cx="110" cy="110" r="92"  fill="none" stroke="#d94f87" stroke-width="0.5"/>
              <circle cx="110" cy="110" r="80"  fill="none" stroke="#d94f87" stroke-width="0.5"/>
              <circle cx="110" cy="110" r="68"  fill="none" stroke="#d94f87" stroke-width="0.5"/>
              <circle cx="110" cy="110" r="56"  fill="none" stroke="#d94f87" stroke-width="0.5"/>
              <circle cx="110" cy="110" r="44"  fill="none" stroke="#d94f87" stroke-width="0.5"/>
              <circle cx="110" cy="110" r="32"  fill="none" stroke="#d94f87" stroke-width="0.5"/>
            </svg>
          </div>
        </div>

        <div class="drop-ring" id="drop-ring"></div>

        <div class="player-vinyl" id="player-vinyl"></div>

        <div class="drop-prompt" id="drop-prompt">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2"/><path d="M12 3v9M12 12l6-3"/></svg>
          <span>Drop a vinyl here</span>
        </div>

        <!-- TONEARM -->
        <div class="tonearm-wrap parked" id="tonearm">
          <svg viewBox="0 0 110 170" width="110" height="170" fill="none">
            <circle cx="95" cy="14" r="9" fill="#3a1825" stroke="rgba(217,79,135,0.3)" stroke-width="1.2"/>
            <circle cx="95" cy="14" r="4.5" fill="#d94f87" opacity="0.55"/>
            <path d="M95 23 Q80 55 50 148" stroke="#422030" stroke-width="6.5" stroke-linecap="round"/>
            <path d="M95 23 Q80 55 50 148" stroke="rgba(217,79,135,0.2)" stroke-width="1" stroke-linecap="round"/>
            <rect x="40" y="143" width="18" height="11" rx="2.5" fill="#3a1825" stroke="rgba(217,79,135,0.35)" stroke-width="1"/>
            <line x1="49" y1="154" x2="49" y2="160" stroke="#d94f87" stroke-width="1.4" stroke-linecap="round" opacity="0.75"/>
          </svg>
        </div>

        <div class="speed-row">
          <div class="speed-dot on" id="spd33" title="33⅓ RPM"></div>
          <div class="speed-dot" id="spd45" title="45 RPM"></div>
        </div>
        <div class="knob-row">
          <div class="vol-label">Vol</div>
          <div class="knob" id="vol-knob"></div>
        </div>

      </div><!-- /turntable-base -->

      <div class="player-controls">
        <div class="now-playing" id="now-playing">
          <div class="np-label">Now Playing</div>
          <div class="np-title" id="np-title">—</div>
          <div class="np-artist" id="np-artist">—</div>
        </div>
        <div class="progress-wrap" id="progress-wrap">
          <div class="progress-bar" id="progress-bar">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="progress-times">
            <span id="time-cur">0:00</span>
            <span id="time-dur">0:00</span>
          </div>
        </div>
        <div class="ctrl-row" id="ctrl-row">
          <div class="ctrl-btn" id="btn-prev" title="Restart / Previous">
            <svg viewBox="0 0 24 24"><polyline points="19 20 9 12 19 4"/><line x1="5" y1="19" x2="5" y2="5"/></svg>
          </div>
          <div class="ctrl-btn" id="btn-play" title="Play / Pause">
            <svg viewBox="0 0 24 24" id="play-icon"><polygon points="5 3 19 12 5 21"/></svg>
          </div>
          <div class="ctrl-btn" id="btn-eject" title="Eject">
            <svg viewBox="0 0 24 24"><polyline points="17 11 12 6 7 11"/><line x1="12" y1="18" x2="12" y2="6"/></svg>
          </div>
        </div>
      </div>

    </div><!-- /player-body -->
  </div>

</div><!-- /stage -->

<div id="drag-ghost"></div>
<div class="toast" id="toast"></div>
<audio id="audio-el" preload="metadata"></audio>

<script src="extras-script.js"></script>
</body>
</html>
